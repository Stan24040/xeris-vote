<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XerisVote — Blockchain Voting</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#020408;--bg2:#070d14;--bg3:#0c1520;--border:rgba(0,180,255,0.12);--blue:#00b4ff;--blue2:#0066ff;--cyan:#00e5ff;--text:#e2e8f0;--muted:#4a6080;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,180,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,180,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(0,102,255,0.08) 0%,transparent 70%);pointer-events:none;z-index:0;}
nav{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid var(--border);backdrop-filter:blur(20px);background:rgba(2,4,8,0.8);}
.logo{display:flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--blue2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 16px rgba(0,180,255,0.4);}
.logo span{color:var(--blue);}
.wallet-pill{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:8px 14px;}
.wallet-pill input{background:transparent;border:none;outline:none;color:var(--text);font-size:13px;width:180px;font-family:'Space Grotesk',sans-serif;}
.wallet-pill input::placeholder{color:var(--muted);}
.btn{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border:none;padding:10px 22px;border-radius:10px;cursor:pointer;font-weight:600;font-size:13px;font-family:'Space Grotesk',sans-serif;transition:all 0.2s;box-shadow:0 0 20px rgba(0,102,255,0.3);}
.btn:hover{transform:translateY(-1px);box-shadow:0 0 30px rgba(0,102,255,0.5);}
.hero{position:relative;z-index:1;text-align:center;padding:80px 24px 48px;}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(0,180,255,0.08);border:1px solid rgba(0,180,255,0.2);color:var(--blue);font-size:12px;font-weight:600;padding:6px 16px;border-radius:20px;margin-bottom:24px;}
.hero h1{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;line-height:1.1;margin-bottom:20px;letter-spacing:-1px;}
.hero h1 .grad{background:linear-gradient(135deg,var(--cyan),var(--blue),#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero p{color:var(--muted);font-size:16px;max-width:500px;margin:0 auto 40px;line-height:1.7;}
.stats{position:relative;z-index:1;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;padding:0 24px 48px;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px 32px;text-align:center;position:relative;overflow:hidden;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--blue),transparent);}
.stat-n{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--blue);line-height:1;margin-bottom:6px;}
.stat-l{font-size:12px;color:var(--muted);letter-spacing:0.5px;}
.filters{position:relative;z-index:1;display:flex;gap:6px;justify-content:center;padding:0 24px 28px;flex-wrap:wrap;}
.ftab{padding:7px 18px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif;transition:all 0.2s;}
.ftab:hover,.ftab.active{border-color:var(--blue);color:var(--blue);background:rgba(0,180,255,0.08);}
.grid{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:0 24px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:22px;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at top right,rgba(0,180,255,0.04),transparent 60%);pointer-events:none;}
.card:hover{border-color:rgba(0,180,255,0.3);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,0.3);}
.tier-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-bottom:14px;}
.t-civil{background:rgba(0,229,255,0.08);color:#00e5ff;border:1px solid rgba(0,229,255,0.2);}
.t-dao{background:rgba(99,102,241,0.08);color:#818cf8;border:1px solid rgba(99,102,241,0.2);}
.t-org{background:rgba(245,158,11,0.08);color:#fbbf24;border:1px solid rgba(245,158,11,0.2);}
.card-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:6px;}
.card-desc{color:var(--muted);font-size:13px;margin-bottom:14px;line-height:1.5;}
.bar-row{margin-bottom:6px;}
.bar-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:3px;}
.bar-track{height:4px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden;}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:2px;transition:width 0.6s;}
.card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;font-size:12px;color:var(--muted);}
.sbadge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
.s-active{background:rgba(0,255,136,0.08);color:#00ff88;border:1px solid rgba(0,255,136,0.2);}
.s-pending{background:rgba(255,165,0,0.08);color:#ffa500;border:1px solid rgba(255,165,0,0.2);}
.s-ended{background:rgba(100,100,120,0.08);color:#64748b;border:1px solid rgba(100,100,120,0.2);}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);z-index:100;align-items:center;justify-content:center;padding:16px;}
.overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;position:relative;}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--blue),var(--cyan),transparent);border-radius:24px 24px 0 0;}
.mhead{display:flex;justify-content:space-between;align-items:start;margin-bottom:20px;}
.mtitle{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.msub{color:var(--muted);font-size:13px;margin-top:4px;}
.xbtn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.xbtn:hover{color:#fff;}
.copt{border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all 0.2s;}
.copt:hover{border-color:rgba(0,180,255,0.3);background:rgba(0,180,255,0.03);}
.copt.sel{border-color:var(--blue);background:rgba(0,180,255,0.06);}
.cname{font-weight:600;font-size:14px;margin-bottom:3px;}
.cdesc{color:var(--muted);font-size:12px;margin-bottom:8px;}
.cbar{height:3px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden;margin-bottom:4px;}
.cfill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));}
.cvotes{font-size:11px;color:var(--muted);}
.flbl{font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:0.3px;}
.finput{width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:13px;font-family:'Space Grotesk',sans-serif;outline:none;margin-bottom:14px;}
.finput:focus{border-color:var(--blue);}
.aerr{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#f87171;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;}
.aok{background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.2);color:#00ff88;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;}
.empty{grid-column:1/-1;text-align:center;padding:60px 24px;color:var(--muted);}
@media(max-width:600px){.hero h1{font-size:34px;}nav{padding:14px 16px;}.wallet-pill input{width:110px;}}
</style>
</head>
<body>
<nav>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    Xeris<span>Vote</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="wallet-pill" id="walletPill">
      <span style="color:var(--muted);font-size:11px;">⬡</span>
      <span id="walletDisplay" style="font-size:13px;color:var(--muted);">Not connected</span>
    </div>
    <button class="btn" id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
  </div>
</nav>
<div class="hero">
  <div class="badge">⚡ Powered by Xeris Blockchain</div>
  <h1>Democracy on the<br/><span class="grad">Blockchain</span></h1>
  <p>Transparent, tamper-proof voting secured by Xeris. Every vote is immutable, publicly verifiable, and trustless.</p>
</div>
<div class="stats">
  <div class="stat"><div class="stat-n" id="sTotal">0</div><div class="stat-l">TOTAL POLLS</div></div>
  <div class="stat"><div class="stat-n" id="sActive">0</div><div class="stat-l">ACTIVE NOW</div></div>
  <div class="stat"><div class="stat-n" id="sVotes">0</div><div class="stat-l">VOTES CAST</div></div>
</div>
<div class="filters">
  <button class="ftab active" onclick="doFilter('all',this)">All</button>
  <button class="ftab" onclick="doFilter('active',this)">🟢 Active</button>
  <button class="ftab" onclick="doFilter('civil',this)">🏛️ Civil</button>
  <button class="ftab" onclick="doFilter('dao',this)">🪙 DAO</button>
  <button class="ftab" onclick="doFilter('org',this)">🏢 Org</button>
  <button class="ftab" onclick="doFilter('ended',this)">✅ Ended</button>
</div>
<div class="grid" id="grid"></div>
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="mhead">
      <div><div class="mtitle" id="mTitle"></div><div class="msub" id="mSub"></div></div>
      <button class="xbtn" onclick="closeM()">✕</button>
    </div>
    <div id="alert"></div>
    <div id="cands"></div>
    <div style="margin-top:18px;">
      <div class="flbl">YOUR WALLET ADDRESS</div>
      <input id="vWallet" class="finput" placeholder="e.g. 3kYh3GqV2HdL7Ki..."/>
      <button class="btn" style="width:100%;padding:13px;" onclick="castVote()">Cast Vote on Xeris</button>
    </div>
  </div>
</div>
<script>
const API='https://xeris-vote-production.up.railway.app';
let polls=[],curr=null,selCand=null,wallet='',cf='all';
async function load(){
  try{
    const r=await fetch(API+'/polls');
    polls=await r.json();
    render();
    document.getElementById('sTotal').textContent=polls.length;
    document.getElementById('sActive').textContent=polls.filter(p=>p.status==='active').length;
    document.getElementById('sVotes').textContent=polls.reduce((s,p)=>s+(p.totalVotes||0),0);
  }catch(e){}
}
function doFilter(f,el){
  cf=f;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}
function render(){
  const g=document.getElementById('grid');
  let list=polls;
  if(cf==='active')list=polls.filter(p=>p.status==='active');
  else if(cf==='ended')list=polls.filter(p=>p.status==='ended');
  else if(['civil','dao','org'].includes(cf))list=polls.filter(p=>p.tier===cf);
  if(!list.length){g.innerHTML='<div class="empty"><div style="font-size:48px;margin-bottom:16px;opacity:0.4">🗳️</div><p>No polls found</p></div>';return;}
  const tl={civil:'🏛️ Civil Election',dao:'🪙 DAO Vote',org:'🏢 Organisation'};
  const tc={civil:'t-civil',dao:'t-dao',org:'t-org'};
  const sc={active:'s-active',pending:'s-pending',ended:'s-ended'};
  g.innerHTML=list.map(p=>{
    const tot=p.totalVotes||0;
    const bars=p.candidates.slice(0,3).map(c=>`
      <div class="bar-row">
        <div class="bar-lbl"><span>${c.name}</span><span>${tot>0?((c.votes/tot)*100).toFixed(0):0}%</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${tot>0?(c.votes/tot)*100:0}%"></div></div>
      </div>`).join('');
    return`<div class="card" onclick="openPoll('${p.id}')">
      <div class="tier-tag ${tc[p.tier]}">${tl[p.tier]}</div>
      <div class="card-title">${p.title}</div>
      <div class="card-desc">${(p.description||'').slice(0,80)}${(p.description||'').length>80?'...':''}</div>
      ${bars}
      ${p.candidates.length>3?`<div style="font-size:11px;color:var(--muted);margin-top:4px;">+${p.candidates.length-3} more</div>`:''}
      <div class="card-foot">
        <span class="sbadge ${sc[p.status]||'s-pending'}">${p.status==='active'?'● ':''} ${p.status.toUpperCase()}</span>
        <span>${tot} votes</span>
      </div>
    </div>`;
  }).join('');
}
function openPoll(id){
  curr=polls.find(p=>p.id===id);
  if(!curr)return;
  selCand=null;
  document.getElementById('alert').innerHTML='';
  document.getElementById('mTitle').textContent=curr.title;
  document.getElementById('mSub').textContent=curr.description||'';
  if(wallet)document.getElementById('vWallet').value=wallet;
  const tot=curr.totalVotes||0;
  document.getElementById('cands').innerHTML=curr.candidates.map(c=>`
    <div class="copt" id="c_${c.id}" onclick="selC('${c.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div class="cname">${c.name}</div>
        <div style="font-size:13px;color:var(--blue);font-weight:700;">${tot>0?((c.votes/tot)*100).toFixed(1):0}%</div>
      </div>
      ${c.description?`<div class="cdesc">${c.description}</div>`:''}
      <div class="cbar"><div class="cfill" style="width:${tot>0?(c.votes/tot)*100:0}%"></div></div>
      <div class="cvotes">${c.votes} votes</div>
    </div>`).join('');
  document.getElementById('overlay').classList.add('open');
}
function selC(id){
  selCand=id;
  document.querySelectorAll('.copt').forEach(e=>e.classList.remove('sel'));
  document.getElementById('c_'+id)?.classList.add('sel');
}
function closeM(){
  document.getElementById('overlay').classList.remove('open');
  curr=null;selCand=null;
}
async function castVote(){
  const w=document.getElementById('vWallet').value.trim();
  document.getElementById('alert').innerHTML='';
  if(!w)return showA('Enter your wallet address','err');
  if(!selCand)return showA('Select a candidate first','err');
  if(curr.status!=='active')return showA('This poll is not active','err');
  try{
    const r=await fetch(API+'/vote',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pollId:curr.id,voterWallet:w,candidateId:selCand})});
    const d=await r.json();
    if(d.error)return showA(d.error,'err');
    showA('✅ Vote recorded on Xeris blockchain!','ok');
    await load();openPoll(curr.id);
  }catch(e){showA('Network error. Try again.','err');}
}
function showA(msg,t){document.getElementById('alert').innerHTML=`<div class="a${t}">${msg}</div>`;}
async function connectWallet(){
  try {
    if(window.xeris){
      const accounts = await window.xeris.connect();
      wallet = accounts.address || accounts[0];
    } else {
      // Fallback: manual entry
      const w = prompt('Enter your Xeris wallet address:');
      if(w) wallet = w.trim();
    }
    if(wallet){
      document.getElementById('walletDisplay').textContent = wallet.slice(0,8)+'...'+wallet.slice(-4);
      document.getElementById('walletDisplay').style.color='#00ff88';
      document.getElementById('connectBtn').textContent = 'Connected';
      document.getElementById('connectBtn').style.background = 'linear-gradient(135deg,#10b981,#059669)';
    }
  } catch(e){ alert('Connection failed: ' + e.message); }
}

function setWallet(){
  const w=document.getElementById('walletInput')?.value?.trim();
  if(w){wallet=w;}
}
window.onclick=e=>{if(e.target===document.getElementById('overlay'))closeM();};
load();setInterval(load,30000);

// Auto connect if xeris wallet available
window.addEventListener('load', async () => {
  if(window.xeris){
    try {
      const accounts = await window.xeris.connect();
      wallet = accounts.address || accounts[0];
      if(wallet){
        document.getElementById('walletDisplay').textContent = wallet.slice(0,8)+'...'+wallet.slice(-4);
        document.getElementById('walletDisplay').style.color='#00ff88';
        document.getElementById('connectBtn').textContent = 'Connected';
        document.getElementById('connectBtn').style.background = 'linear-gradient(135deg,#10b981,#059669)';
      }
    } catch(e){}
  }
});
</script>
</body>
</html>
